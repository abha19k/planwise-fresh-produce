<ng-container>
  <c-container [fluid]="true" class="border-bottom px-4">
    <button
      [cSidebarToggle]="sidebarId()"
      cHeaderToggler
      class="btn"
      toggle="visible"
      style="margin-inline-start: -14px;"
      aria-label="Toggle sidebar navigation"
    >
      <svg cIcon name="cilMenu" size="lg"></svg>
    </button>

    <!-- Left navigation -->
    <c-header-nav class="d-none d-md-flex">
      <c-nav-item>
        <a cNavLink routerLink="/dashboard" routerLinkActive="active">
          Dashboard
        </a>
      </c-nav-item>
    </c-header-nav>

    <!-- Theme toggle -->
    <c-header-nav class="ms-auto">
      <ng-container *ngTemplateOutlet="themeDropdown" />
    </c-header-nav>

    <!-- User dropdown -->
    <c-header-nav class="mx-0">
      <ng-container *ngTemplateOutlet="userDropdown" />
    </c-header-nav>
  </c-container>

  <!-- Breadcrumb -->
  <c-container [fluid]="true" class="px-4">
    <c-breadcrumb-router />
  </c-container>
</ng-container>


<!-- ================= USER DROPDOWN ================= -->
<ng-template #userDropdown>
  <c-dropdown [popperOptions]="{ placement: 'bottom-start' }" variant="nav-item">

    <!-- Avatar + Name -->
    <button
      [caret]="false"
      cDropdownToggle
      class="py-0 pe-0 d-flex align-items-center gap-2"
      aria-label="Open user menu"
    >
      <!-- Initials Avatar -->
      <div
        class="rounded-1 bg-primary text-white d-flex align-items-center justify-content-center position-relative"
        style="width: 36px; height: 36px; font-weight: 600;"
      >
        {{ userInitials() }}

        <!-- Online dot -->
        <span
          class="position-absolute bg-success border border-white rounded-circle"
          style="width: 10px; height: 10px; right: -2px; bottom: -2px;"
        ></span>
      </div>

      <!-- Name -->
      <span class="d-none d-md-inline small">
        {{ userDisplayName() }}
      </span>
    </button>

    <!-- Dropdown menu -->
    <ul cDropdownMenu class="pt-0 w-auto">

      <!-- Header -->
      <li>
        <h6
          cDropdownHeader
          class="bg-body-secondary text-body-secondary fw-semibold py-2 rounded-top"
        >
          Account
        </h6>
      </li>

      <!-- User info -->
      <li class="px-3 py-2" style="min-width: 250px;">
        <div class="fw-semibold">
          {{ userDisplayName() }}
        </div>

        <div class="text-body-secondary small">
          {{ userEmail() }}
        </div>

        <div class="text-body-secondary small text-capitalize">
          Role: {{ userRole() }}
        </div>
      </li>

      <!-- Divider -->
      <li>
        <hr cDropdownDivider />
      </li>

      <!-- Logout -->
      <li>
        <button cDropdownItem type="button" (click)="logout()">
          <svg cIcon class="me-2" name="cilAccountLogout"></svg>
          Logout
        </button>
      </li>

    </ul>
  </c-dropdown>
</ng-template>


<!-- ================= THEME DROPDOWN ================= -->
<ng-template #themeDropdown>
  <c-dropdown alignment="end" variant="nav-item">
    <button [caret]="false" cDropdownToggle aria-label="Open theme picker">
      <svg cIcon [name]="icons()" size="lg"></svg>
    </button>

    <div cDropdownMenu>
      @for (mode of colorModes; track mode.name) {
        <button
          (click)="colorMode.set(mode.name)"
          [active]="colorMode() === mode.name"
          cDropdownItem
          class="d-flex align-items-center"
        >
          <svg cIcon class="me-2" [name]="mode.icon" size="lg"></svg>
          {{ mode.text }}
        </button>
      }
    </div>
  </c-dropdown>
</ng-template>
