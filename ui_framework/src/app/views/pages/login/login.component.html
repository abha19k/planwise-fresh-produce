<div class="bg-light dark:bg-transparent min-vh-100 d-flex flex-row align-items-center">
  <c-container breakpoint="md">
    <c-row class="justify-content-center">
      <c-col lg="6" xl="5">
        <c-card class="p-4 shadow">
          <c-card-body>

            <form cForm>
              <h1>Login</h1>
              <p class="text-body-secondary">Sign in to your account</p>

              <c-input-group class="mb-3">
                <span cInputGroupText>
                  <svg cIcon name="cilUser"></svg>
                </span>
                <input
                  cFormControl
                  type="email"
                  placeholder="Email"
                  autoComplete="username"
                  [(ngModel)]="email"
                  name="email"
                />
              </c-input-group>

              <c-input-group class="mb-4">
                <span cInputGroupText>
                  <svg cIcon name="cilLockLocked"></svg>
                </span>
                <input
                  cFormControl
                  type="password"
                  placeholder="Password"
                  autoComplete="current-password"
                  [(ngModel)]="password"
                  name="password"
                  (keyup.enter)="login()"
                />
              </c-input-group>

              <button
                cButton
                color="primary"
                class="w-100"
                type="button"
                [disabled]="loading"
                (click)="login()"
              >
                {{ loading ? 'Logging in...' : 'Login' }}
              </button>

              <div *ngIf="errorMessage" class="text-danger mt-3 text-center">
                {{ errorMessage }}
              </div>

            </form>

          </c-card-body>
        </c-card>
      </c-col>
    </c-row>
  </c-container>
</div>
